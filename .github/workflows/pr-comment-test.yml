name: pr comment test

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Leave a test comment on the PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          timestamp="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          gh pr comment "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --body "This is a test comment. Current time: $timestamp"
