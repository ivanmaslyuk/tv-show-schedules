services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tvshows
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvshows"]
      interval: 5s
      timeout: 5s
      retries: 10

  flyway:
    image: flyway/flyway:10
    command: -url=jdbc:postgresql://db:5432/tvshows -user=postgres -password=postgres -connectRetries=60 migrate
    volumes:
      - ./migrations:/flyway/sql:ro
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/tvshows
      JWT_SECRET: dev-secret
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully

